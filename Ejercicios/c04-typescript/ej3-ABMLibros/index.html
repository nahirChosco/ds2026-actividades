<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Catalogo</h1>
    <input type="text" id="filtroAutor">
    <button id="filtrar">Filtrar</button>
    <button id="mostrarDisponibles">Solo disponibles</button>
    <button id="mostrarTodos">Ver Todos</button>
    <ul id="listado"></ul>
    <p id="stats"></p>

    <form>
        <h2>Cargar Libros</h2>
        <label for="titulo">Titulo:</label>
        <input type="text" id="tituloLibro">
        <label for="autor">Autor:</label>
        <input type="text" id="autorLibro">
        <label for="precio">Precio:</label>
        <input type="number" id="precioLibro">
        <label for="genero" >Genero:</label>
        <input type="text" id="generoLibro">
        <label for="disponible">Disponible</label>
        <input type="checkbox" id="dispLibro">
        <button type="button" id="agregarLibro">Agregar Libro</button>
    </form>
    <div id="errorForm"></div>

    <script src="app.js"></script>
</body>
</html>
